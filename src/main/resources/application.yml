# application.yml
server:
  port: 8080
  servlet:
    session:
      timeout: 3600
# --- Netease Cloud Music API 配置 ---
netease:
  api:
    url: http://localhost:3000

# 数据库配置 (Datasource)
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/neteasecloudmusic?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # DDL 模式：update 会在项目启动时自动创建或更新表结构
      ddl-auto: update
    show-sql: true # 是否打印执行的 SQL 语句
    properties:
      hibernate:
        # 数据库方言
        dialect: org.hibernate.dialect.MySQLDialect
  ai:
    openai:
      # 1. DeepSeek API Key
      api-key: sk-3f26345bc152461294d6eb4dff31cd03

      # 2.将 Base URL 指向 DeepSeek
      base-url: https://api.deepseek.com
      # 增加超时配置（可选，推荐）
      client:
        connect-timeout: 10s
        read-timeout: 60s

      chat:
        options:
           # 3.指定 DeepSeek 模型
          model: deepseek-chat
          # 0.7 比较适合创意生成
          temperature: 0.7
  jackson:
    deserialization:
      # 遇到未知属性时不报错
      fail-on-unknown-properties: false
  mvc:
    async:
      request-timeout: 120000 # 将异步请求超时时间延长至 120 秒 (2分钟)

# --- OpenFeign 客户端配置 ---
# 配置 Feign 客户端的基础 URL
feign:
  client:
    config:
      netease-music-api: # FeignClient 接口的 name 属性
        url: ${netease.api.url} # 使用上面定义的 URL
        connectTimeout: 5000  # 连接超时 5秒
        readTimeout: 10000    # 读取超时 10秒 (对于数据接口足够)

# JWT 配置块
jwt:
  secret-key: YourSecureSecretKeyForJWTAuthentication1234567890ABCDEF # ⚠️ 密钥至少 256 位
  expiration-time: 86400000 # 24 小时 (ms)

app:
  upload-dir: D:/Java/NeteaseCloudMusic/src/main/resources/photo

# ✅ 新增：开启详细日志，报错时控制台会打印出 DeepSeek 返回的原始信息
logging:
  level:
    org.springframework.ai: DEBUG
    org.springframework.web.client: DEBUG


<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的音乐云 - 注册</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="login-body">
<div class="login-container">
    <h1 class="login-title">📝 注册新账号</h1>
    <div class="input-group">
        <input type="text" id="phone" placeholder="手机号 (账号)" required>
    </div>
    <div class="input-group">
        <input type="text" id="username" placeholder="昵称" required>
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="设置密码" required>
    </div>
    <div class="input-group">
        <input type="password" id="confirmPassword" placeholder="确认密码" required>
    </div>
    <button id="registerBtn" class="login-button">注 册</button>
    <p id="message" class="login-message"></p>
    <div class="register-link">
        已有账号？<a href="auth.html">立即登录</a>
    </div>
</div>

<script src="js/register.js"></script>
</body>
</html>
